<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homem Mais Orelhudo do Brasil 👂🇧🇷</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap');

        :root {
            --amarelo: #ffcc00;
            --laranja: #ff8800;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'VT323', monospace;
            color: white;
            background: #0a0a0a;
            overflow-x: hidden;
        }

        /* FUNDOS */
        .background {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://i.imgur.com/5tdoP.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            z-index: -3;
        }

        .cavalo-meme {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://i.imgur.com/0z3fK8J.jpeg');
            background-size: cover;
            opacity: 0.12;
            z-index: -2;
            mix-blend-mode: overlay;
        }

        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.78), rgba(40,20,0,0.88));
            z-index: -1;
        }

        /* NAVEGAÇÃO */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(0,0,0,0.9);
            border-bottom: 6px solid var(--amarelo);
            z-index: 1000;
            padding: 15px 0;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
        }

        .nav-btn {
            background: none;
            border: 4px solid var(--amarelo);
            color: var(--amarelo);
            padding: 12px 25px;
            font-size: 1.6rem;
            cursor: pointer;
            font-family: 'Press Start 2P', cursive;
        }

        .nav-btn.active {
            background: var(--amarelo);
            color: #000;
        }

        /* CONTEÚDO DAS ABAS */
        .tab-content {
            display: none;
            padding-top: 100px;
        }

        .tab-content.active {
            display: block;
        }

        /* HERO (aba Início) */
        .hero {
            height: 90vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .hero h1 {
            font-family: 'Press Start 2P', cursive;
            font-size: 5.2rem;
            text-shadow: 0 0 30px var(--amarelo), 0 0 60px var(--laranja);
            color: #ffdd88;
        }

        .hero .subtitle {
            font-size: 3.5rem;
            color: #ffcc00;
        }

        /* JOGOS */
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
            gap: 25px;
            padding: 20px;
        }

        .game-card {
            background: rgba(255, 204, 0, 0.15);
            border: 8px solid var(--amarelo);
            border-radius: 25px;
            padding: 20px;
            text-align: center;
        }

        .game-container {
            background: #111;
            border: 6px solid #ffcc00;
            border-radius: 15px;
            padding: 15px;
            margin: 15px 0;
            position: relative;
            height: 380px;
            overflow: hidden;
        }

        canvas {
            background: #000;
            border-radius: 10px;
            image-rendering: pixelated;
        }

        .game-title {
            font-size: 2rem;
            color: var(--amarelo);
            margin: 15px 0;
        }

        footer {
            background: #111;
            padding: 60px 20px;
            text-align: center;
            font-size: 1.8rem;
            border-top: 10px solid #ffcc00;
        }

        .audio-controls {
            position: fixed;
            top: 80px;
            right: 25px;
            z-index: 100;
            background: rgba(0,0,0,0.8);
            padding: 12px 22px;
            border-radius: 50px;
            border: 5px solid #ffcc00;
            font-size: 1.6rem;
        }
    </style>
</head>
<body>

    <div class="background"></div>
    <div class="cavalo-meme"></div>
    <div class="overlay"></div>

    <!-- NAVEGAÇÃO -->
    <nav>
        <div class="nav-container">
            <button class="nav-btn active" onclick="showTab(0)">Início</button>
            <button class="nav-btn" onclick="showTab(1)">Músicas</button>
            <button class="nav-btn" onclick="showTab(2)">Shorts Ciluliro</button>
            <button class="nav-btn" onclick="showTab(3)">Jogos do Ciluliro</button>
        </div>
    </nav>

    <div class="audio-controls">
        <button onclick="toggleMainAudio()" id="mainAudioBtn">🔊 ÁUDIO LIGADO</button>
    </div>

    <!-- ABA INÍCIO -->
    <div id="tab0" class="tab-content active">
        <section class="hero">
            <div>
                <h1>HOMEM MAIS<br>ORELHUDO<br>DO BRASIL</h1>
                <p class="subtitle">O rei das orelhas gigantes 👂🇧🇷</p>
            </div>
        </section>
    </div>

    <!-- ABA MÚSICAS -->
    <div id="tab1" class="tab-content">
        <section style="padding-top: 120px;">
            <h2>🎵 MÚSICAS DO MACHIMELLO</h2>
            <div class="games-grid" style="grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));">
                <button class="music-btn" onclick="playMusic(0)" style="padding:25px; font-size:1.8rem;">Alone</button>
                <button class="music-btn" onclick="playMusic(1)" style="padding:25px; font-size:1.8rem;">Happier</button>
                <button class="music-btn" onclick="playMusic(2)" style="padding:25px; font-size:1.8rem;">FRIENDS</button>
                <button class="music-btn" onclick="playMusic(3)" style="padding:25px; font-size:1.8rem;">Stars</button>
            </div>
        </section>
    </div>

    <!-- ABA SHORTS CILULIRO -->
    <div id="tab2" class="tab-content">
        <section class="shorts-section" style="padding-top: 120px;">
            <h2>📱 SHORTS DO CILULIRO</h2>
            <div class="shorts-feed" style="display:flex; gap:20px; overflow-x:auto; padding:20px 0;">
                <div class="shorts-item"><iframe src="https://www.youtube.com/embed/Vy8V3YJE-TI" allowfullscreen></iframe></div>
                <div class="shorts-item"><iframe src="https://www.youtube.com/embed/9n7BgK7xzUA" allowfullscreen></iframe></div>
                <div class="shorts-item"><iframe src="https://www.youtube.com/embed/ALZHF5UqnU4" allowfullscreen></iframe></div>
            </div>
        </section>
    </div>

    <!-- ABA JOGOS -->
    <div id="tab3" class="tab-content">
        <section style="padding-top: 120px;">
            <h2>🎮 JOGOS DO CILULIRO</h2>
            <div class="games-grid">

                <!-- Jogo 1: Cilurilo Clicker -->
                <div class="game-card">
                    <div class="game-title">🖱️ CILURILO CLICKER</div>
                    <div class="game-container">
                        <canvas id="clickerCanvas" width="360" height="340"></canvas>
                    </div>
                    <p>Pontos: <span id="score">0</span></p>
                    <button onclick="resetClicker()" style="margin-top:10px; padding:10px 20px;">Reiniciar</button>
                </div>

                <!-- Jogo 2: Suco do Silulo -->
                <div class="game-card">
                    <div class="game-title">🥤 SUCO DO SILULO</div>
                    <div class="game-container">
                        <canvas id="sucoCanvas" width="360" height="340"></canvas>
                    </div>
                    <p>Pontos: <span id="sucoScore">0</span></p>
                </div>

            </div>
        </section>
    </div>

    <footer>
        <p>Homem Mais Orelhudo do Brasil + Jogos do Ciluliro 👂🇧🇷</p>
    </footer>

    <script>
        // ===================== NAVEGAÇÃO =====================
        function showTab(n) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.getElementById('tab' + n).classList.add('active');
            
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.nav-btn')[n].classList.add('active');
        }

        // ===================== ÁUDIO =====================
        let mainAudio = null;
        function initMainAudio() {
            mainAudio = document.createElement('iframe');
            mainAudio.style.position = 'absolute';
            mainAudio.style.width = '0'; mainAudio.style.height = '0'; mainAudio.style.opacity = '0';
            mainAudio.src = "https://www.youtube.com/embed/ALZHF5UqnU4?autoplay=1&loop=1&playlist=ALZHF5UqnU4";
            mainAudio.allow = "autoplay";
            document.body.appendChild(mainAudio);
        }

        function toggleMainAudio() {
            const btn = document.getElementById('mainAudioBtn');
            btn.textContent = btn.textContent.includes('LIGADO') ? '🔇 ÁUDIO DESLIGADO' : '🔊 ÁUDIO LIGADO';
        }

        // ===================== PLAYLIST =====================
        const musicIds = ["ALZHF5UqnU4", "0mV4iWAy8dU", "C5f1f0j8Z8U", "A57B7B6w3kw"];
        function playMusic(index) {
            const iframe = document.createElement('iframe');
            iframe.style.position = 'absolute'; iframe.style.opacity = '0';
            iframe.src = `https://www.youtube.com/embed/${musicIds[index]}?autoplay=1`;
            document.body.appendChild(iframe);
        }

        // ===================== JOGO 1: CILURILO CLICKER =====================
        let clickerScore = 0;
        const clickerCanvas = document.getElementById('clickerCanvas');
        const ctx1 = clickerCanvas.getContext('2d');

        function drawClicker() {
            ctx1.clearRect(0, 0, 360, 340);
            ctx1.font = '60px VT323';
            ctx1.fillStyle = '#ffcc00';
            ctx1.fillText('👂', 140, 180);
            ctx1.font = '30px VT323';
            ctx1.fillText('CLIQUE!', 120, 280);
        }

        clickerCanvas.addEventListener('click', () => {
            clickerScore += Math.floor(Math.random() * 5) + 3;
            document.getElementById('score').textContent = clickerScore;
            
            // animação de clique
            ctx1.fillStyle = '#fff';
            ctx1.font = '40px VT323';
            ctx1.fillText('+ ' + (Math.floor(Math.random()*5)+3), Math.random()*200 + 80, 100);
            setTimeout(drawClicker, 80);
        });

        function resetClicker() {
            clickerScore = 0;
            document.getElementById('score').textContent = 0;
        }

        // ===================== JOGO 2: SUCO DO SILULO =====================
        let sucoScore = 0;
        let sucoY = 50;
        let sucoX = 180;
        const sucoCanvas = document.getElementById('sucoCanvas');
        const ctx2 = sucoCanvas.getContext('2d');

        function gameLoopSuco() {
            ctx2.clearRect(0, 0, 360, 340);
            ctx2.fillStyle = '#00f0ff';
            ctx2.fillRect(sucoX, sucoY, 40, 60); // suco
            ctx2.fillStyle = '#ffcc00';
            ctx2.fillText('🥤', sucoX - 5, sucoY + 50);

            sucoY += 6;
            if (sucoY > 340) {
                sucoY = 0;
                sucoX = Math.random() * 300 + 30;
            }

            // colisão com mouse (simples)
            sucoCanvas.addEventListener('mousemove', (e) => {
                const rect = sucoCanvas.getBoundingClientRect();
                if (Math.abs(e.clientX - rect.left - sucoX) < 50 && Math.abs(e.clientY - rect.top - sucoY) < 60) {
                    sucoScore += 10;
                    document.getElementById('sucoScore').textContent = sucoScore;
                    sucoY = 0;
                    sucoX = Math.random() * 300 + 30;
                }
            }, {once: true});

            requestAnimationFrame(gameLoopSuco);
        }

        // ===================== INICIALIZAÇÃO =====================
        window.onload = () => {
            initMainAudio();
            drawClicker();
            gameLoopSuco();
            showTab(0); // começa na aba Início
            console.log('%c👂 Site completo com Jogos do Ciluliro carregado!', 'color:#ffcc00;font-size:22px');
        };
    </script>
</body>
</html>
