<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Download</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:linear-gradient(135deg,#0f172a,#2563eb);
}

.card{
    background:white;
    padding:40px;
    border-radius:20px;
    text-align:center;
    width:400px;
    box-shadow:0 10px 30px rgba(0,0,0,.3);
}

h1{
    margin-bottom:15px;
}

p{
    color:#555;
    margin-bottom:25px;
}

button{
    background:#2563eb;
    color:white;
    border:none;
    padding:18px 40px;
    font-size:20px;
    border-radius:50px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:scale(1.05);
}
</style>
</head>
<body>

<div class="card">

<h1>📥 Download</h1>

<p>Clique abaixo para baixar a imagem.</p>

<button onclick="baixar()">⬇️ Baixar Agora</button>

</div>

<script>
function baixar(){
    const link=document.createElement("a");

    // Troque pelo nome da sua imagem dentro do repositório
    link.href="images(1).jpeg";

    link.download="imagem.jpeg";

    document.body.appendChild(link);

    link.click();

    document.body.removeChild(link);
}
</script>

</body>
</html>
