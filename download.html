<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Download da Imagem</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#2563eb,#38bdf8);
}

.card{
    width:420px;
    background:white;
    border-radius:20px;
    padding:35px;
    text-align:center;
    box-shadow:0 15px 35px rgba(0,0,0,.3);
}

img{
    width:250px;
    border-radius:12px;
    margin:20px 0;
}

button{
    background:#2563eb;
    color:white;
    border:none;
    padding:18px 35px;
    border-radius:50px;
    font-size:20px;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}
</style>

</head>
<body>

<div class="card">

<h1>📥 Download</h1>

<p>Clique para baixar a imagem.</p>

<img src="assinatura.png">

<br><br>

<a href="assinatura.png" download="assinatura.png">
<button>⬇️ Baixe aqui</button>
</a>

</div>

</body>
</html>
